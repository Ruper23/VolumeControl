name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller pystray pywin32 pillow

      - name: Generate icon
        run: |
          python -c "
          import os
          from PIL import Image, ImageDraw
          os.makedirs('build_icon', exist_ok=True)
          size = 256
          img = Image.new('RGBA', (size, size), (0, 0, 0, 0))
          draw = ImageDraw.Draw(img)
          cx, cy = size // 2, size // 2
          for r in range(cx, 0, -1):
              ratio = r / cx
              c = int(30 + 15 * (1 - ratio))
              draw.ellipse((cx-r, cy-r, cx+r, cy+r), fill=(c, c, c+40, 255))
          body = [(int(cx-size*0.12),int(cy-size*0.18)),(int(cx+size*0.02),int(cy-size*0.14)),
                  (int(cx+size*0.02),int(cy+size*0.14)),(int(cx-size*0.12),int(cy+size*0.18))]
          draw.polygon(body, fill=(80,80,90,255), outline=(120,120,130,255))
          cone = [(int(cx+size*0.02),int(cy-size*0.10)),(int(cx+size*0.18),int(cy-size*0.22)),
                  (int(cx+size*0.18),int(cy+size*0.22)),(int(cx+size*0.02),int(cy+size*0.10))]
          draw.polygon(cone, fill=(60,60,70,255), outline=(100,100,110,255))
          for i, (r, w) in enumerate([(0.28,4),(0.36,3),(0.44,2)]):
              radius = int(size * r)
              alpha = 255 - i * 40
              draw.arc((cx+int(size*0.10)-radius, cy-radius, cx+int(size*0.10)+radius, cy+radius),
                       start=-50, end=50, fill=(0,200,255,alpha), width=w)
          img.save('icon.ico', format='ICO', sizes=[(256,256),(128,128),(64,64),(48,48),(32,32),(16,16)])
          print('Icon generated')
          "

      - name: Build EXE with icon
        run: |
          pyinstaller --onefile --noconsole --name "VolumeControl" --icon=icon.ico ^
            --collect-all pystray ^
            --collect-all PIL ^
            --hidden-import=pycaw ^
            --hidden-import=pycaw.pycaw ^
            --hidden-import=comtypes ^
            --hidden-import=comtypes.client ^
            --hidden-import=pynput ^
            --hidden-import=pynput.mouse ^
            --hidden-import=pynput.keyboard ^
            --hidden-import=pystray._win32 ^
            --hidden-import=pystray._util ^
            --hidden-import=win32gui ^
            --hidden-import=win32api ^
            --hidden-import=win32con ^
            --hidden-import=win32gui_struct ^
            --hidden-import=winreg ^
            --hidden-import=_tkinter ^
            volume_control.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VolumeControl
          path: dist/VolumeControl.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/VolumeControl.exe
          generate_release_notes: true
          name: VolumeControl ${{ github.ref_name }}
          body: |
            ## VolumeControl ${{ github.ref_name }}

            ### Установка
            1. Скачайте `VolumeControl.exe`
            2. Запустите — программа готова к работе
            3. Иконка появится в системном трее

            ### Использование
            - **Scroll ↑/↓** на панели задач — изменение громкости
            - **Средняя кнопка** на панели задач — Mute/Unmute
            - **Правый клик** по иконке в трее — настройки
